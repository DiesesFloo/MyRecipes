name: Build

on:
  pull_request:
    branches: 
    - main

jobs:
  build:
    name: Build and Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"
          cache: gradle

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Run checks
        run: ./gradlew check
